name: PR14 Test Fix

on:
  push:
    branches:
      - feature/evidence-claim-model-v2

permissions:
  contents: write

concurrency:
  group: pr14-test-fix
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - name: Correct morphology expectation
        shell: python
        run: |
          from pathlib import Path

          path = Path("tests/test_claim_model_v2.py")
          text = path.read_text(encoding="utf-8")
          old = "assert relationship.evidence_class is EvidenceClass.A_EXPLICIT"
          new = "assert relationship.evidence_class is EvidenceClass.B_MORPHOLOGICALLY_EXPLICIT"
          if text.count(old) != 1:
              raise SystemExit("expected assertion not found exactly once")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")

      - name: Commit fix
        run: |
          set -Eeuo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_claim_model_v2.py
          git commit -m "Correct morphology evidence-class expectation"
          git push
