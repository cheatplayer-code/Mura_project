name: PR14 Mypy Fix

on:
  push:
    branches:
      - feature/evidence-claim-model-v2

permissions:
  contents: write

concurrency:
  group: pr14-mypy-fix
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - name: Apply targeted type fixes
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/mura/claim_model.py")
          text = path.read_text(encoding="utf-8")
          replacements = {
              "return cast(ObjectT, item.model_copy(update=update)), issues": (
                  "return item.model_copy(update=update), issues"
              ),
              '''    return [
                  cast(
                      ObjectT,
                      item.model_copy(update={"conflict_ids": mapping.get(_object_identity(item), [])}),
                  )
                  for item in items
              ]''': '''    return [
                  item.model_copy(update={"conflict_ids": mapping.get(_object_identity(item), [])})
                  for item in items
              ]''',
              '''    for person in result.people_mentions:
                  item, item_issues = _materialize_item(''': '''    for person in result.people_mentions:
                  materialized_person, item_issues = _materialize_item(''',
              "        people.append(item)\n        issues.extend(item_issues)": (
                  "        people.append(materialized_person)\n        issues.extend(item_issues)"
              ),
              '''    for relationship in result.relationship_claims:
                  item, item_issues = _materialize_item(''': '''    for relationship in result.relationship_claims:
                  materialized_relationship, item_issues = _materialize_item(''',
              "        relationships.append(item)\n        issues.extend(item_issues)": (
                  "        relationships.append(materialized_relationship)\n        issues.extend(item_issues)"
              ),
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"expected source fragment not found: {old[:80]!r}")
              text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")

      - name: Commit fixes
        run: |
          set -Eeuo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/mura/claim_model.py
          git commit -m "Fix PR14 claim model typing"
          git push
