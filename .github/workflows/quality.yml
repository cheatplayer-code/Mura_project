name: Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          check-latest: false

      - name: Install project and development tools
        run: python -m pip install --disable-pip-version-check -q -e ".[dev]"

      - name: Validate workflow security policy
        run: python scripts/ci/check_workflow_policy.py

      - name: Lint
        run: ruff check .

      - name: Generate formatting patch
        id: formatting
        shell: bash
        run: |
          set -Eeuo pipefail
          ruff format .
          git diff --binary > ruff-format.patch
          if test -s ruff-format.patch; then
            echo "Formatting changes are required. Download the ruff-format-patch artifact."
            exit 1
          fi

      - name: Upload formatting patch
        if: failure() && steps.formatting.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ruff-format-patch
          path: ruff-format.patch
          if-no-files-found: error
          retention-days: 1

      - name: Type check
        id: typing
        shell: bash
        run: |
          set -o pipefail
          mypy src/mura apps services scripts 2>&1 | tee mypy-report.txt

      - name: Upload mypy diagnostics
        if: failure() && steps.typing.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mypy-report
          path: mypy-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Test with coverage
        run: >-
          pytest -ra
          --cov=mura
          --cov=apps.api
          --cov=services.kaggle_asr
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=45

      - name: Static security scan
        run: bandit -q -r src apps services -ll
