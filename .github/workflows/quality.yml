name: Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          check-latest: false

      - name: Install project and development tools
        run: python -m pip install --disable-pip-version-check -q -e ".[dev]"

      - name: Validate workflow security policy
        run: python scripts/ci/check_workflow_policy.py

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check --diff .

      - name: Type check
        run: mypy src/mura apps services scripts

      - name: Test with coverage
        run: >-
          pytest -ra
          --cov=mura
          --cov=apps.api
          --cov=services.kaggle_asr
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=45

      - name: Static security scan
        run: bandit -q -r src apps services -ll
