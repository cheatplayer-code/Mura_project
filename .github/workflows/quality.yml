name: Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          check-latest: false

      - name: Install project and development tools
        run: python -m pip install --disable-pip-version-check -q -e ".[dev]"

      - name: Validate workflow security policy
        run: python scripts/ci/check_workflow_policy.py

      - name: Lint
        id: lint
        shell: bash
        run: |
          set -o pipefail
          ruff check . 2>&1 | tee ruff-report.txt

      - name: Upload Ruff diagnostics
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ruff-report
          path: ruff-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Generate formatting patch
        id: formatting
        shell: bash
        run: |
          set -Eeuo pipefail
          ruff format .
          git diff --binary > ruff-format.patch
          if test -s ruff-format.patch; then
            echo "Formatting changes are required. Download the ruff-format-patch artifact."
            exit 1
          fi

      - name: Upload formatting patch
        if: failure() && steps.formatting.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ruff-format-patch
          path: |
            ruff-format.patch
            src/mura/claim_model.py
            src/mura/relationship_evidence.py
            src/mura/validation.py
            tests/test_claim_model_v2.py
          if-no-files-found: error
          retention-days: 1

      - name: Type check
        id: typing
        shell: bash
        run: |
          set -o pipefail
          mypy src/mura apps services scripts 2>&1 | tee mypy-report.txt

      - name: Upload mypy diagnostics
        if: failure() && steps.typing.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mypy-report
          path: mypy-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Test with coverage
        id: tests
        shell: bash
        run: |
          set -o pipefail
          pytest -ra \
            --junitxml=pytest-report.xml \
            --cov=mura \
            --cov=apps.api \
            --cov=services.kaggle_asr \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=45 2>&1 | tee pytest-output.txt

      - name: Upload pytest diagnostics
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pytest-diagnostics
          path: |
            pytest-output.txt
            pytest-report.xml
            coverage.xml
          if-no-files-found: warn
          retention-days: 1

      - name: Evaluate release benchmark
        id: release_gate
        shell: bash
        run: |
          set -o pipefail
          mura-evaluate-core \
            --manifest benchmarks/manifest.json \
            --json-output artifacts/release-benchmark.json \
            --markdown-output artifacts/release-benchmark.md \
            --gate-config benchmarks/release_gates.json \
            --gate-profile pull_request \
            --baseline docs/baselines/current_main.json \
            --entity-resolution-dataset benchmarks/entity_resolution_v1.json \
            --gate-output artifacts/release-gate.json \
            --gate-markdown-output artifacts/release-gate.md \
            2>&1 | tee release-gate-output.txt

      - name: Upload release evaluation
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-evaluation
          path: |
            artifacts/release-benchmark.json
            artifacts/release-benchmark.md
            artifacts/release-gate.json
            artifacts/release-gate.md
            release-gate-output.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Static security scan
        run: bandit -q -r src apps services -ll
